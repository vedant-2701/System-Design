function renderChips(arr,cls){return arr.map(a=>`<span class="chip ${cls||''}">${a}</span>`).join('')}
function renderPhase(p){
  const topicsHtml=p.topics.map((t,ti)=>`
    <div class="topic-block">
      <div class="topic-header" onclick="toggleTopic(this)">
        <span class="topic-name">${t.name}</span>
        <span class="int-badge ${t.int==='High'?'high-badge':t.int==='Medium'?'med-badge':''}">${t.int||'Medium'} Int.</span>
        <i class="ti ti-chevron-down chevron" aria-hidden="true"></i>
      </div>
      <div class="topic-body">
        <div class="topic-row">
          <div class="topic-cell"><div class="cell-label">Subtopics</div><div class="subtopic-chips">${renderChips(t.subtopics,'imp')}</div></div>
          <div class="topic-cell"><div class="cell-label">Implementation focus</div><div class="cell-val">${t.impl}</div></div>
        </div>
        ${t.mistake?`<div class="mistake-box"><i class="ti ti-alert-triangle" aria-hidden="true" style="font-size:13px;margin-right:4px"></i><strong>Common mistake:</strong> ${t.mistake}</div>`:''}
      </div>
    </div>`).join('');
  const projHtml=p.projects&&p.projects.length?`<div class="section"><div class="section-label">Mini projects</div><div class="proj-grid">${p.projects.map(pr=>`<div class="proj-card"><div class="proj-name">${pr.name}</div><div class="proj-desc">${pr.desc}</div></div>`).join('')}</div></div>`:'';
  const sysHtml=p.systems&&p.systems.length?`<div class="section"><div class="section-label">Real-world systems</div><div class="sys-chips">${p.systems.map(s=>`<span class="sys-chip">${s}</span>`).join('')}</div></div>`:'';
  return`
    <div class="phase" id="phase-${p.id}">
      <div class="phase-header" onclick="togglePhase(this)">
        <span class="phase-num">${p.num}</span>
        <span class="phase-title">${p.title}</span>
        <div class="phase-tags">${p.tags.map(t=>`<span class="tag ${t==='Interview'?'tag-int':'tag-impl'}">${t}</span>`).join('')}</div>
        <i class="ti ti-chevron-down chevron" aria-hidden="true"></i>
      </div>
      <div class="phase-body">
        <div class="section"><div class="section-label">Objective</div><div class="obj-box">${p.obj}</div></div>
        <div class="section"><div class="section-label">Why it matters</div><div class="why-box">${p.why}</div></div>
        <div class="section"><div class="section-label">Prerequisites</div><ul class="prereq-list">${p.prereqs.map(r=>`<li>${r}</li>`).join('')}</ul></div>
        <div class="section"><div class="section-label">Topics</div>${topicsHtml}</div>
        ${projHtml}${sysHtml}
      </div>
    </div>`;
}
function togglePhase(el){
  const body=el.nextElementSibling;
  const chev=el.querySelector('.chevron');
  const open=body.classList.toggle('open');
  chev.classList.toggle('open',open);
}
function toggleTopic(el){
  const body=el.nextElementSibling;
  const chev=el.querySelector('.chevron');
  const open=body.classList.toggle('open');
  chev.classList.toggle('open',open);
}
function filterRoadmap(q){
  q=q.toLowerCase().trim();
  phases.forEach(p=>{
    const el=document.getElementById('phase-'+p.id);
    if(!q){el.classList.remove('hidden');return;}
    const text=(p.title+p.obj+p.why+p.topics.map(t=>t.name+' '+t.subtopics.join(' ')+' '+t.impl).join(' ')+p.prereqs.join(' ')).toLowerCase();
    el.classList.toggle('hidden',!text.includes(q));
  });
  const nav=document.getElementById('topNav');
  nav.querySelectorAll('.nav-pill').forEach(pill=>{
    const id=pill.dataset.id;
    const el=document.getElementById('phase-'+id);
    pill.classList.toggle('hidden',el&&el.classList.contains('hidden'));
  });
}
const container=document.getElementById('phasesContainer');
container.innerHTML=phases.map(renderPhase).join('');
const nav=document.getElementById('topNav');
nav.innerHTML=phases.map(p=>`<button class="nav-pill" data-id="${p.id}" onclick="scrollToPhase('${p.id}',this)">${p.num}. ${p.title.split('—')[1]?.trim()||p.title}</button>`).join('');
function scrollToPhase(id,btn){
  const el=document.getElementById('phase-'+id);
  if(!el)return;
  el.scrollIntoView({behavior:'smooth',block:'start'});
  const body=el.querySelector('.phase-body');
  const chev=el.querySelector('.phase-header .chevron');
  if(!body.classList.contains('open')){body.classList.add('open');chev.classList.add('open');}
  nav.querySelectorAll('.nav-pill').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
}
</script>
